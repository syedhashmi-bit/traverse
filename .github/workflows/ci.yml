name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Syntax check
        run: |
          python -m py_compile app.py database.py wireguard.py alerts.py \
                                notifications.py cache_ext.py routes/*.py

      - name: Run pytest
        run: pytest -q

      - name: Smoke test app factory
        env:
          SECRET_KEY: ci-secret-key-not-for-prod-xxxxxxxxxxxxxxxxxxxx
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: ci-test-password
          WG_ENDPOINT: ci.example
          DATABASE_PATH: /tmp/ci-smoke.db
        run: |
          python -c "from app import create_app; \
            app = create_app(); \
            c = app.test_client(); \
            r = c.get('/'); \
            assert r.status_code == 302, r.status_code; \
            print('factory smoke OK')"
