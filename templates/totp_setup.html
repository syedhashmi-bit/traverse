<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup 2FA — Traverse</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      text-decoration: none;
    }

    .login-logo img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
    }

    .login-logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.4px;
    }

    .login-logo-text span { color: var(--accent); }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
    }

    .login-heading {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .qr-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .qr-wrap img {
      border-radius: var(--radius);
      background: #fff;
      padding: 10px;
      width: 200px;
      height: 200px;
    }

    .secret-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 0.88rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-align: center;
      word-break: break-all;
      margin-bottom: 20px;
      cursor: pointer;
      user-select: all;
    }

    .step {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
    }

    .step-num {
      color: var(--accent);
      font-weight: 600;
      flex-shrink: 0;
    }

    .steps { margin-bottom: 24px; }

    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <a href="/login" class="login-logo">
    <img src="/static/img/app.png" alt="traverse logo">
    <span class="login-logo-text">tra<span>verse</span></span>
  </a>

  <div class="login-card">
    <div class="login-heading">Set up authenticator</div>
    <div class="login-sub">Scan the QR code with Google Authenticator, Authy, or any TOTP app.</div>

    <div class="qr-wrap">
      <img src="data:image/png;base64,{{ qr_b64 }}" alt="TOTP QR code">
    </div>

    <div class="steps">
      <div class="step"><span class="step-num">1.</span> Open your authenticator app and add a new account.</div>
      <div class="step"><span class="step-num">2.</span> Scan the QR code above, or enter the key manually:</div>
    </div>

    <div class="secret-box" title="Click to select all">{{ secret }}</div>

    <a href="/login/verify" class="btn btn-primary w-full btn-lg" style="display:block; text-align:center; text-decoration:none;">
      Done — enter my code →
    </a>
  </div>

  <div class="login-footer">
    traverse · WireGuard VPN Dashboard
  </div>

</div>

</body>
</html>
