<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify — Traverse</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      text-decoration: none;
    }

    .login-logo img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
    }

    .login-logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.4px;
    }

    .login-logo-text span { color: var(--accent); }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
    }

    .login-heading {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .login-error {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: #fca5a5;
      font-size: 0.875rem;
      margin-bottom: 20px;
    }

    .totp-input {
      font-size: 1.6rem;
      letter-spacing: 0.25em;
      text-align: center;
      font-family: var(--mono);
    }

    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .setup-link {
      display: block;
      margin-top: 18px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
    }
    .setup-link:hover { color: var(--accent); }
  </style>
</head>
<body>

<div class="login-wrap">

  <a href="/login" class="login-logo">
    <img src="/static/img/app.png" alt="traverse logo">
    <span class="login-logo-text">tra<span>verse</span></span>
  </a>

  <div class="login-card">
    <div class="login-heading">Two-factor authentication</div>
    <div class="login-sub">Enter the 6-digit code from your authenticator app.</div>

    {% if error %}
    <div class="login-error">
      <span>✕</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login/verify" autocomplete="off">
      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label" for="code">Authenticator code</label>
        <input class="form-input totp-input" type="text" id="code" name="code"
               inputmode="numeric" pattern="[0-9 ]{6,7}" maxlength="7"
               autocomplete="one-time-code" required autofocus
               placeholder="000000">
      </div>

      <button type="submit" class="btn btn-primary w-full btn-lg">
        Verify
      </button>
    </form>

    <a href="/totp-setup" class="setup-link">
      First time? Scan the QR code →
    </a>
  </div>

  <div class="login-footer">
    traverse · WireGuard VPN Dashboard
  </div>

</div>

</body>
</html>
